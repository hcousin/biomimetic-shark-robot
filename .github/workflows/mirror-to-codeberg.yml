name: Mirror to Codeberg

on:
  push:
    branches: ["**"]
    tags: ["**"]
  delete:
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Mirror to Codeberg
        env:
          CB_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          echo "machine codeberg.org login hcousin password ${CB_TOKEN}" > ~/.netrc
          chmod 600 ~/.netrc
          git clone --bare "https://hcousin:${GH_PAT}@github.com/${{ github.repository }}.git" repo_bare
          cd repo_bare
          git push --mirror "https://codeberg.org/hcousin/${REPO_NAME}.git"
