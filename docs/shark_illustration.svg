    <stop offset="0%"   stop-color="#243E58"/>
    <stop offset="100%" stop-color="#5A8AAA"/>
  </linearGradient>

  <!-- Schwanzflosse-Gradient -->
  <linearGradient id="cGrad" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
    <stop offset="0%"   stop-color="#243E58"/>
    <stop offset="100%" stop-color="#3A6882"/>
  </linearGradient>

