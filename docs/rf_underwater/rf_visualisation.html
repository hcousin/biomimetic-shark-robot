<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RF Unterwasser Visualisierung — Shark Robot</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: monospace; background: #fafaf8; color: #222; padding: 20px; }
  h1 { font-size: 18px; margin-bottom: 4px; }
  .sub { font-size: 12px; color: #666; margin-bottom: 20px; }
  .controls { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 20px;
              background: #f0f0ee; padding: 14px; border-radius: 8px; }
  .ctrl { display: flex; flex-direction: column; gap: 4px; }
  label { font-size: 11px; color: #555; }
  select, input[type=range] { font-size: 12px; padding: 4px; border-radius: 4px; border: 1px solid #ccc; }
  .val { font-size: 13px; font-weight: bold; color: #333; }
  .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .chart-box { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 14px; }
  .chart-box h2 { font-size: 13px; margin-bottom: 12px; color: #444; }
  canvas { max-width: 100%; }
  .rec { margin-top: 16px; background: white; border-left: 4px solid #1D9E75;
         padding: 12px 16px; border-radius: 0 8px 8px 0; font-size: 12px; line-height: 1.7; }
  .rec h3 { font-size: 13px; margin-bottom: 6px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px;
           font-weight: bold; margin-right: 4px; }
  .ok   { background: #E1F5EE; color: #085041; }
  .warn { background: #FAEEDA; color: #633806; }
  .bad  { background: #FCEBEB; color: #791F1F; }
  @media(max-width:600px){ .charts { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<h1>RF Signalübertragung unter Wasser</h1>
<p class="sub">Biomimetic Shark Robot — Steuerungs-Reichweitenanalyse</p>

<div class="controls">
  <div class="ctrl">
    <label>Wasser-Typ</label>
    <select id="wtype" onchange="updateAll()">
      <option value="100">Süsswasser (Pool/See)</option>
      <option value="10">Brakwasser</option>
      <option value="0.2">Meerwasser</option>
    </select>
  </div>
  <div class="ctrl">
    <label>Zieltiefe</label>
    <input type="range" id="depth" min="0.1" max="3" step="0.1" value="1.5" oninput="updateAll()">
    <span class="val" id="v-depth">1.5 m</span>
  </div>
</div>

<div class="charts">
  <div class="chart-box">
    <h2>Dämpfung bei Zieltiefe [dB]</h2>
    <div style="position:relative;height:280px"><canvas id="barChart"></canvas></div>
  </div>
  <div class="chart-box">
    <h2>Skin-Tiefe vs. Frequenz [m]</h2>
    <div style="position:relative;height:280px"><canvas id="lineChart"></canvas></div>
  </div>
  <div class="chart-box">
    <h2>Signalstärke vs. Tiefe (ausgewählte Frequenzen)</h2>
    <div style="position:relative;height:280px"><canvas id="depthChart"></canvas></div>
  </div>
  <div class="chart-box">
    <h2>Brauchbarer Tiefenbereich je Frequenz</h2>
    <div style="position:relative;height:280px"><canvas id="rangeChart"></canvas></div>
  </div>
</div>

<div class="rec" id="recBox"></div>

<script>
const FREQS = [
  { name: 'WiFi 2.4 GHz', f: 2.4e9, color: '#D85A30' },
  { name: '433 MHz',       f: 433e6, color: '#EF9F27' },
  { name: '27 MHz',        f: 27e6,  color: '#378ADD' },
  { name: '3.5 MHz',       f: 3.5e6, color: '#1D9E75' },
  { name: '300 kHz',       f: 300e3, color: '#7F77DD' },
];

function skinDepth(rho, f) { return 503 * Math.sqrt(rho / f); }
function attDB(depth, delta) { return 20 * Math.log10(Math.exp(-depth / delta)); }

let barChart, lineChart, depthChart, rangeChart;

function mkBar(ctx, labels, data, colors) {
  return new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets: [{ data, backgroundColor: colors, borderRadius: 4 }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { min: -80, max: 0, title: { display: true, text: 'Dämpfung [dB]', font: { size: 10 } },
             ticks: { font: { size: 10 } } },
        x: { ticks: { font: { size: 9 } } }
      }
    }
  });
}

function mkLine(ctx, datasets) {
  return new Chart(ctx, {
    type: 'line',
    data: { labels: datasets[0].labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { font: { size: 10 }, boxWidth: 12 } } },
      scales: {
        y: { title: { display: true, text: 'Skin-Tiefe [m]', font: { size: 10 } },
             ticks: { font: { size: 10 } } },
        x: { ticks: { font: { size: 9 } } }
      }
    }
  });
}

function updateAll() {
  const rho = parseFloat(document.getElementById('wtype').value);
  const depth = parseFloat(document.getElementById('depth').value);
  document.getElementById('v-depth').textContent = depth.toFixed(1) + ' m';

  const depths = Array.from({length:31}, (_,i) => +(i*0.1).toFixed(1));

  // ── Bar Chart: Dämpfung bei Zieltiefe ──
  const attVals = FREQS.map(({f}) => {
    const d = skinDepth(rho, f);
    return Math.max(-80, attDB(depth, d));
  });
  const barColors = attVals.map(a => a > -6 ? '#1D9E75' : a > -20 ? '#EF9F27' : '#D85A30');
  if (barChart) barChart.destroy();
  barChart = mkBar(document.getElementById('barChart').getContext('2d'),
    FREQS.map(f => f.name), attVals, barColors);

  // ── Line Chart: Skin-Tiefe je Frequenz ──
  // Log scale over rho range
  const rhoRange = [100, 10, 0.2];
  const rhoLabels = ['Süss', 'Brack', 'Meer'];
  if (lineChart) lineChart.destroy();
  lineChart = mkLine(document.getElementById('lineChart').getContext('2d'),
    FREQS.map(({name, f, color}) => ({
      label: name,
      data: rhoRange.map(r => +skinDepth(r, f).toFixed(3)),
      borderColor: color,
      backgroundColor: 'transparent',
      tension: 0.3,
      pointRadius: 4,
      labels: rhoLabels
    }))
  );

  // ── Depth Chart: Signalstärke vs Tiefe ──
  if (depthChart) depthChart.destroy();
  depthChart = new Chart(document.getElementById('depthChart').getContext('2d'), {
    type: 'line',
    data: {
      labels: depths,
      datasets: FREQS.map(({name, f, color}) => {
        const delta = skinDepth(rho, f);
        return {
          label: name,
          data: depths.map(d => Math.max(-80, attDB(d, delta))),
          borderColor: color,
          backgroundColor: 'transparent',
          tension: 0.2,
          pointRadius: 0,
          borderWidth: 2
        };
      })
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { labels: { font: { size: 10 }, boxWidth: 12 } },
        annotation: {}
      },
      scales: {
        x: { title: { display: true, text: 'Tiefe [m]', font: { size: 10 } },
             ticks: { maxTicksLimit: 8, font: { size: 9 } } },
        y: { min: -80, max: 0,
             title: { display: true, text: 'Dämpfung [dB]', font: { size: 10 } },
             ticks: { font: { size: 10 } } }
      }
    }
  });

  // ── Range Chart: Brauchbarer Tiefenbereich ──
  const maxUsableDepths = FREQS.map(({f}) => {
    const delta = skinDepth(rho, f);
    // Find depth where att = -8.686 dB (1× skin depth)
    return +delta.toFixed(3);
  });
  if (rangeChart) rangeChart.destroy();
  rangeChart = new Chart(document.getElementById('rangeChart').getContext('2d'), {
    type: 'bar',
    data: {
      labels: FREQS.map(f => f.name),
      datasets: [{
        label: 'Skin-Tiefe δ [m]',
        data: maxUsableDepths,
        backgroundColor: maxUsableDepths.map(d => d > 2 ? '#1D9E75' : d > 0.5 ? '#EF9F27' : '#D85A30'),
        borderRadius: 4
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { title: { display: true, text: 'δ [m]', font: { size: 10 } },
             ticks: { font: { size: 10 } } },
        y: { ticks: { font: { size: 10 } } }
      }
    }
  });

  // ── Empfehlung ──
  const deltas = FREQS.map(({f}) => skinDepth(rho, f));
  const attrs = deltas.map(d => attDB(depth, d));
  let recHTML = '<h3>Empfehlung für ' + depth.toFixed(1) + 'm Tiefe:</h3><ul style="margin:8px 0 0 16px">';

  FREQS.forEach(({name}, i) => {
    const att = attrs[i];
    const cls = att > -6 ? 'ok' : att > -20 ? 'warn' : 'bad';
    const lbl = att > -6 ? 'Brauchbar' : att > -20 ? 'Grenzwertig' : 'Unbrauchbar';
    recHTML += `<li><span class="badge ${cls}">${lbl}</span>${name}: ${att.toFixed(1)} dB</li>`;
  });
  recHTML += '</ul>';

  if (depth >= 0.8) {
    recHTML += '<br><strong>Für dieses Projekt empfohlen:</strong><br>';
    recHTML += '① Tether RS485 (4-adrig, CHF 15) — sofort & zuverlässig<br>';
    recHTML += '② Hybrid: WiFi an Oberfläche + autonomer Modus unter Wasser<br>';
    recHTML += '③ Akustisch (DIY Piezo) — kabellos, aber aufwändig';
  }

  document.getElementById('recBox').innerHTML = recHTML;
}

updateAll();
</script>
</body>
</html>
