name: Migrate all repos to Codeberg (one-time + mirror setup)

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: "[1] Create + Push: biomimetic-shark-robot"
        env:
          CB_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          # Create repo on Codeberg (ignore if already exists)
          curl -s -X POST "https://codeberg.org/api/v1/user/repos" \
            -H "Authorization: token ${CB_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"name":"biomimetic-shark-robot","private":false,"auto_init":false}'

          # Write credentials
          git config --global credential.helper store
          printf 'https://hcousin:%s@codeberg.org\n' "${CB_TOKEN}" >> ~/.git-credentials
          printf 'https://hcousin:%s@github.com\n' "${GH_PAT}" >> ~/.git-credentials
          chmod 600 ~/.git-credentials

          # Clone and push
          git clone --bare "https://github.com/hcousin/biomimetic-shark-robot.git" r1
          cd r1
          git push --mirror "https://codeberg.org/hcousin/biomimetic-shark-robot.git"
          cd .. && rm -rf r1

      - name: "[2] Create + Push: SBB_Display_Arduino_GTFSRT"
        env:
          CB_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          curl -s -X POST "https://codeberg.org/api/v1/user/repos" \
            -H "Authorization: token ${CB_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"name":"SBB_Display_Arduino_GTFSRT","description":"ESP32-S3 e-paper SBB departure board using GTFS-RT and OJP APIs from opentransportdata.swiss","private":false,"auto_init":false}'

          git config --global credential.helper store
          printf 'https://hcousin:%s@codeberg.org\n' "${CB_TOKEN}" >> ~/.git-credentials
          printf 'https://hcousin:%s@github.com\n' "${GH_PAT}" >> ~/.git-credentials
          chmod 600 ~/.git-credentials

          git clone --bare "https://github.com/hcousin/SBB_Display_Arduino_GTFSRT.git" r2
          cd r2
          git push --mirror "https://codeberg.org/hcousin/SBB_Display_Arduino_GTFSRT.git"
          cd .. && rm -rf r2

      - name: "[3] Create + Push: SBB_Display_Arduino_Json (privat)"
        env:
          CB_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          curl -s -X POST "https://codeberg.org/api/v1/user/repos" \
            -H "Authorization: token ${CB_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"name":"SBB_Display_Arduino_Json","private":true,"auto_init":false}'

          git config --global credential.helper store
          printf 'https://hcousin:%s@codeberg.org\n' "${CB_TOKEN}" >> ~/.git-credentials
          printf 'https://hcousin:%s@github.com\n' "${GH_PAT}" >> ~/.git-credentials
          chmod 600 ~/.git-credentials

          git clone --bare "https://hcousin:${GH_PAT}@github.com/hcousin/SBB_Display_Arduino_Json.git" r3
          cd r3
          git push --mirror "https://codeberg.org/hcousin/SBB_Display_Arduino_Json.git"
          cd .. && rm -rf r3

      - name: "Done"
        run: |
          echo "https://codeberg.org/hcousin/biomimetic-shark-robot"
          echo "https://codeberg.org/hcousin/SBB_Display_Arduino_GTFSRT"
          echo "https://codeberg.org/hcousin/SBB_Display_Arduino_Json"
