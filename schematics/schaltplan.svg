<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <style>
    text { font-family: monospace; font-size: 12px; fill: #222; }
    .title { font-size: 16px; font-weight: bold; }
    .label { font-size: 10px; fill: #444; }
    .component { fill: #f0f4ff; stroke: #3355aa; stroke-width: 1.5; }
    .wire { stroke: #222; stroke-width: 1.5; fill: none; }
    .power { stroke: #cc2222; stroke-width: 2; fill: none; }
    .gnd { stroke: #226622; stroke-width: 2; fill: none; }
    .signal { stroke: #2255cc; stroke-width: 1.5; fill: none; }
  </style>

  <!-- Background -->
  <rect width="1200" height="800" fill="#fafafa" stroke="#ccc" stroke-width="1"/>

  <!-- Title -->
  <text x="600" y="30" text-anchor="middle" class="title">Biomimetic Shark Robot — Schaltplan v1.0</text>
  <text x="600" y="48" text-anchor="middle" class="label">ESP32 + Brushless Motor ESC + Sensoren + Ballast</text>

  <!-- LIPO BATTERY 3S -->
  <rect x="20" y="70" width="100" height="60" class="component" rx="4"/>
  <text x="70" y="96" text-anchor="middle" font-size="11" font-weight="bold">LiPo 3S</text>
  <text x="70" y="110" text-anchor="middle" font-size="10">11.1V 2200mAh</text>
  <text x="70" y="124" text-anchor="middle" font-size="10">XT60 Stecker</text>
  <!-- B+ -->
  <line x1="120" y1="85" x2="155" y2="85" class="power"/>
  <text x="123" y="82" font-size="9" fill="#cc2222">B+</text>
  <!-- B- -->
  <line x1="120" y1="115" x2="155" y2="115" class="gnd"/>
  <text x="123" y="128" font-size="9" fill="#226622">GND</text>

  <!-- MAIN POWER BUS -->
  <line x1="155" y1="85" x2="155" y2="680" class="power"/>
  <line x1="165" y1="115" x2="165" y2="680" class="gnd"/>
  <text x="140" y="65" font-size="10" fill="#cc2222">+11.1V Bus</text>
  <text x="168" y="65" font-size="10" fill="#226622">GND Bus</text>

  <!-- ESC 20A -->
  <rect x="200" y="70" width="110" height="80" class="component" rx="4"/>
  <text x="255" y="95" text-anchor="middle" font-size="11" font-weight="bold">ESC 20A</text>
  <text x="255" y="108" text-anchor="middle" font-size="10">Hobbywing</text>
  <text x="255" y="121" text-anchor="middle" font-size="10">PWM Input</text>
  <text x="255" y="134" text-anchor="middle" font-size="10">BEC 5V/3A out</text>
  <!-- ESC Power In -->
  <line x1="155" y1="85" x2="200" y2="85" class="power"/>
  <line x1="165" y1="115" x2="200" y2="115" class="gnd"/>
  <!-- ESC to Motor -->
  <line x1="310" y1="90" x2="370" y2="90" stroke="#FF6600" stroke-width="2"/>
  <line x1="310" y1="100" x2="370" y2="100" stroke="#FF6600" stroke-width="2"/>
  <line x1="310" y1="110" x2="370" y2="110" stroke="#FF6600" stroke-width="2"/>
  <text x="320" y="86" font-size="9" fill="#FF6600">Phase A</text>
  <text x="320" y="98" font-size="9" fill="#FF6600">Phase B</text>
  <text x="320" y="114" font-size="9" fill="#FF6600">Phase C</text>
  <!-- BEC output -->
  <line x1="255" y1="150" x2="255" y2="180" class="power" stroke-dasharray="4,2"/>
  <text x="258" y="170" font-size="9" fill="#cc5500">5V BEC</text>

  <!-- BRUSHLESS MOTOR -->
  <rect x="370" y="60" width="120" height="80" class="component" rx="4"/>
  <text x="430" y="88" text-anchor="middle" font-size="11" font-weight="bold">BL Motor</text>
  <text x="430" y="101" text-anchor="middle" font-size="10">KV=900</text>
  <text x="430" y="114" text-anchor="middle" font-size="10">20-30W</text>
  <text x="430" y="127" text-anchor="middle" font-size="10">Outrunner</text>

  <!-- GEAR + NOCKE -->
  <rect x="370" y="170" width="120" height="60" fill="#ffffcc" stroke="#aaa822" stroke-width="1.5" rx="4"/>
  <text x="430" y="196" text-anchor="middle" font-size="11" font-weight="bold">Getriebe 40:1</text>
  <text x="430" y="210" text-anchor="middle" font-size="10">10:1 + 4:1</text>
  <text x="430" y="222" text-anchor="middle" font-size="10">→ Nockenwelle</text>
  <!-- Motor to Gear -->
  <line x1="430" y1="140" x2="430" y2="170" stroke="#555" stroke-width="2"/>

  <!-- 5V POWER BUS from BEC -->
  <line x1="255" y1="180" x2="255" y2="200" class="power" stroke-dasharray="4,2"/>
  <line x1="255" y1="200" x2="700" y2="200" class="power" stroke-dasharray="4,2"/>
  <text x="260" y="196" font-size="9" fill="#cc5500">+5V Rail</text>

  <!-- ESP32 -->
  <rect x="560" y="220" width="140" height="200" class="component" rx="4"/>
  <text x="630" y="244" text-anchor="middle" font-size="12" font-weight="bold">ESP32</text>
  <text x="630" y="258" text-anchor="middle" font-size="10">DevKit v1</text>
  <!-- Pins -->
  <text x="570" y="278" font-size="9">VIN ←</text>
  <text x="570" y="293" font-size="9">GND ←</text>
  <text x="570" y="308" font-size="9">GPIO25 →</text>
  <text x="570" y="323" font-size="9">GPIO21 ↔</text>
  <text x="570" y="338" font-size="9">GPIO22 ↔</text>
  <text x="570" y="353" font-size="9">SDA/SCL</text>
  <!-- 5V to ESP32 -->
  <line x1="560" y1="273" x2="540" y2="273" class="power" stroke-dasharray="4,2"/>
  <line x1="540" y1="200" x2="540" y2="273" class="power" stroke-dasharray="4,2"/>
  <!-- GPIO 25 (ESC PWM) -->
  <line x1="700" y1="302" x2="730" y2="302" class="signal"/>
  <line x1="730" y1="302" x2="730" y2="130" class="signal"/>
  <line x1="730" y1="130" x2="310" y2="130" class="signal"/>
  <text x="705" y="298" font-size="9" fill="#2255cc">PWM ESC</text>

  <!-- I2C Bus -->
  <line x1="700" y1="318" x2="760" y2="318" class="signal"/>
  <line x1="700" y1="333" x2="760" y2="333" class="signal"/>
  <text x="705" y="314" font-size="9" fill="#2255cc">SDA</text>
  <text x="705" y="346" font-size="9" fill="#2255cc">SCL</text>
  <!-- I2C bus vertical -->
  <line x1="760" y1="318" x2="760" y2="500" class="signal"/>
  <line x1="770" y1="333" x2="770" y2="500" class="signal"/>

  <!-- PCA9685 -->
  <rect x="200" y="280" width="130" height="120" class="component" rx="4"/>
  <text x="265" y="302" text-anchor="middle" font-size="11" font-weight="bold">PCA9685</text>
  <text x="265" y="316" text-anchor="middle" font-size="10">I2C Servo Driver</text>
  <text x="265" y="330" text-anchor="middle" font-size="10">16 Kanäle</text>
  <text x="265" y="344" text-anchor="middle" font-size="9">CH2: Brustfl. L</text>
  <text x="265" y="357" text-anchor="middle" font-size="9">CH3: Brustfl. R</text>
  <text x="265" y="370" text-anchor="middle" font-size="9">CH4: Ballast</text>
  <!-- I2C to PCA9685 -->
  <line x1="560" y1="318" x2="540" y2="318" class="signal"/>
  <line x1="540" y1="318" x2="540" y2="340" class="signal"/>
  <line x1="540" y1="340" x2="330" y2="340" class="signal"/>
  <line x1="330" y1="340" x2="330" y2="320" class="signal"/>
  <line x1="330" y1="320" x2="200" y2="320" class="signal" stroke-dasharray="3,2"/>
  <!-- 5V to PCA -->
  <line x1="265" y1="280" x2="265" y2="250" class="power" stroke-dasharray="4,2"/>
  <line x1="265" y1="250" x2="255" y2="250" class="power" stroke-dasharray="4,2"/>
  <line x1="255" y1="250" x2="255" y2="200" class="power" stroke-dasharray="4,2"/>

  <!-- SERVOS -->
  <rect x="20" y="370" width="80" height="45" fill="#eeffee" stroke="#226622" stroke-width="1.5" rx="4"/>
  <text x="60" y="390" text-anchor="middle" font-size="10" font-weight="bold">Brustfl. L</text>
  <text x="60" y="405" text-anchor="middle" font-size="9">MG90S IP67</text>

  <rect x="115" y="370" width="80" height="45" fill="#eeffee" stroke="#226622" stroke-width="1.5" rx="4"/>
  <text x="155" y="390" text-anchor="middle" font-size="10" font-weight="bold">Brustfl. R</text>
  <text x="155" y="405" text-anchor="middle" font-size="9">MG90S IP67</text>

  <rect x="20" y="430" width="80" height="45" fill="#eeffee" stroke="#226622" stroke-width="1.5" rx="4"/>
  <text x="60" y="451" text-anchor="middle" font-size="10" font-weight="bold">Ballast</text>
  <text x="60" y="465" text-anchor="middle" font-size="9">MG996R IP67</text>

  <!-- Servo Signals from PCA -->
  <line x1="200" y1="357" x2="120" y2="357" class="signal"/>
  <line x1="120" y1="357" x2="120" y2="393" class="signal"/>
  <line x1="120" y1="393" x2="100" y2="393" class="signal"/>

  <line x1="200" y1="365" x2="170" y2="365" class="signal" stroke-dasharray="3,2"/>
  <line x1="170" y1="365" x2="170" y2="393" class="signal" stroke-dasharray="3,2"/>
  <line x1="170" y1="393" x2="195" y2="393" class="signal" stroke-dasharray="3,2"/>

  <line x1="200" y1="370" x2="140" y2="370" class="signal"/>
  <line x1="140" y1="370" x2="140" y2="453" class="signal"/>
  <line x1="140" y1="453" x2="100" y2="453" class="signal"/>

  <!-- MS5837 Sensor -->
  <rect x="800" y="300" width="120" height="70" class="component" rx="4"/>
  <text x="860" y="324" text-anchor="middle" font-size="11" font-weight="bold">MS5837</text>
  <text x="860" y="338" text-anchor="middle" font-size="10">Tiefensensor</text>
  <text x="860" y="352" text-anchor="middle" font-size="10">I2C 0x76</text>
  <text x="860" y="365" text-anchor="middle" font-size="9">0–30 bar, ±2mm</text>
  <!-- I2C to MS5837 -->
  <line x1="760" y1="330" x2="800" y2="330" class="signal"/>

  <!-- MPU6050 -->
  <rect x="800" y="400" width="120" height="70" class="component" rx="4"/>
  <text x="860" y="424" text-anchor="middle" font-size="11" font-weight="bold">MPU-6050</text>
  <text x="860" y="438" text-anchor="middle" font-size="10">IMU (6-DOF)</text>
  <text x="860" y="452" text-anchor="middle" font-size="10">I2C 0x68</text>
  <text x="860" y="465" text-anchor="middle" font-size="9">Accel + Gyro</text>
  <!-- I2C to MPU -->
  <line x1="760" y1="430" x2="800" y2="430" class="signal"/>

  <!-- WIFI/BT -->
  <rect x="800" y="500" width="120" height="50" fill="#fff0cc" stroke="#cc8822" stroke-width="1.5" rx="4"/>
  <text x="860" y="522" text-anchor="middle" font-size="11" font-weight="bold">WiFi/BT</text>
  <text x="860" y="537" text-anchor="middle" font-size="10">ESP32 intern</text>
  <text x="860" y="548" text-anchor="middle" font-size="9">UDP Port 4210</text>

  <!-- POWER NOTES -->
  <rect x="20" y="560" width="260" height="100" fill="#fff9e6" stroke="#cc9922" stroke-width="1" rx="4"/>
  <text x="150" y="580" text-anchor="middle" font-size="11" font-weight="bold">Stromversorgung</text>
  <text x="30" y="598" font-size="10">LiPo 3S 11.1V → ESC → Motor</text>
  <text x="30" y="613" font-size="10">LiPo 3S 11.1V → BEC 5V → ESP32</text>
  <text x="30" y="628" font-size="10">BEC 5V → PCA9685 → Servos</text>
  <text x="30" y="643" font-size="10">Max. Strom: 20A (Motor) + 2A (Logik)</text>
  <text x="30" y="655" font-size="10">Akku-Kapazität: 2200mAh → ~45min</text>

  <!-- WATERPROOFING NOTES -->
  <rect x="300" y="560" width="240" height="100" fill="#f0f9ff" stroke="#2266cc" stroke-width="1" rx="4"/>
  <text x="420" y="580" text-anchor="middle" font-size="11" font-weight="bold">Wasserdichtheit</text>
  <text x="310" y="598" font-size="10">Alle Servo-Kabeldurchführ.: IP67</text>
  <text x="310" y="613" font-size="10">Gehäuse: O-Ring 80×3mm NBR</text>
  <text x="310" y="628" font-size="10">Kabelverbindungen: JST-SM IP68</text>
  <text x="310" y="643" font-size="10">Drucktest: 50cm / 10 min vor Start</text>
  <text x="310" y="655" font-size="10">Silikagel (2g) innen als Backup</text>

  <!-- I2C Addresses -->
  <rect x="560" y="560" width="220" height="100" fill="#f0fff0" stroke="#226622" stroke-width="1" rx="4"/>
  <text x="670" y="580" text-anchor="middle" font-size="11" font-weight="bold">I2C Adressen</text>
  <text x="570" y="598" font-size="10">PCA9685:    0x40</text>
  <text x="570" y="613" font-size="10">MPU-6050:   0x68</text>
  <text x="570" y="628" font-size="10">MS5837:     0x76</text>
  <text x="570" y="643" font-size="10">SDA: GPIO 21 (ESP32)</text>
  <text x="570" y="655" font-size="10">SCL: GPIO 22 (ESP32)</text>

  <!-- GPIO SUMMARY -->
  <rect x="800" y="580" width="220" height="130" fill="#fff0f0" stroke="#cc2222" stroke-width="1" rx="4"/>
  <text x="910" y="600" text-anchor="middle" font-size="11" font-weight="bold">ESP32 GPIO-Belegung</text>
  <text x="810" y="618" font-size="10">GPIO 25  → ESC PWM (50Hz)</text>
  <text x="810" y="633" font-size="10">GPIO 21  ↔ I2C SDA</text>
  <text x="810" y="648" font-size="10">GPIO 22  ↔ I2C SCL</text>
  <text x="810" y="663" font-size="10">GPIO 3V3 → Sensor VCC</text>
  <text x="810" y="678" font-size="10">GPIO GND → Masse</text>
  <text x="810" y="693" font-size="10">GPIO 0   → Boot (nicht belegen!)</text>
  <text x="810" y="706" font-size="10">WiFi AP: "SharkControl"</text>

  <!-- Legend -->
  <line x1="20" y1="760" x2="60" y2="760" class="power"/>
  <text x="65" y="764" font-size="10">+11.1V</text>
  <line x1="100" y1="760" x2="140" y2="760" class="gnd"/>
  <text x="145" y="764" font-size="10">GND</text>
  <line x1="185" y1="760" x2="225" y2="760" class="signal"/>
  <text x="230" y="764" font-size="10">Signal/I2C</text>
  <line x1="290" y1="760" x2="330" y2="760" class="power" stroke-dasharray="4,2"/>
  <text x="335" y="764" font-size="10">+5V BEC</text>
  <line x1="380" y1="760" x2="420" y2="760" stroke="#FF6600" stroke-width="2"/>
  <text x="425" y="764" font-size="10">Motor-Phasen</text>
</svg>
