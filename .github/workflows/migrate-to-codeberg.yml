name: Migrate all repos to Codeberg (one-time + mirror setup)

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: "Debug: Test Codeberg connectivity and auth"
        env:
          CB_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
        run: |
          set -e
          echo "=== Testing Codeberg API ==="
          curl -s "https://codeberg.org/api/v1/user" \
            -H "Authorization: token ${CB_TOKEN}" | python3 -c "import sys,json; d=json.load(sys.stdin); print('Logged in as:', d.get('login','ERROR'), d.get('message',''))"

          echo "=== Testing git clone from GitHub ==="
          git clone --bare "https://github.com/hcousin/biomimetic-shark-robot.git" test_bare
          ls test_bare/

          echo "=== Testing git push to Codeberg ==="
          cd test_bare
          git remote add codeberg "https://codeberg.org/hcousin/biomimetic-shark-robot.git"
          # Use credential helper
          git config credential.helper store
          echo "https://hcousin:${CB_TOKEN}@codeberg.org" > ~/.git-credentials
          chmod 600 ~/.git-credentials
          git push --mirror codeberg 2>&1 || echo "EXIT CODE: $?"
          cd ..
          rm -rf test_bare

      - name: "[2] Mirror push: SBB_Display_Arduino_GTFSRT"
        env:
          CB_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config --global credential.helper store
          echo "https://hcousin:${CB_TOKEN}@codeberg.org" > ~/.git-credentials
          chmod 600 ~/.git-credentials
          git clone --bare "https://hcousin:${GH_PAT}@github.com/hcousin/SBB_Display_Arduino_GTFSRT.git" r2
          cd r2
          git push --mirror "https://codeberg.org/hcousin/SBB_Display_Arduino_GTFSRT.git"
          cd .. && rm -rf r2

      - name: "[3] Mirror push: SBB_Display_Arduino_Json"
        env:
          CB_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config --global credential.helper store
          echo "https://hcousin:${CB_TOKEN}@codeberg.org" > ~/.git-credentials
          chmod 600 ~/.git-credentials
          git clone --bare "https://hcousin:${GH_PAT}@github.com/hcousin/SBB_Display_Arduino_Json.git" r3
          cd r3
          git push --mirror "https://codeberg.org/hcousin/SBB_Display_Arduino_Json.git"
          cd .. && rm -rf r3

      - name: "✅ Migration complete"
        run: |
          echo "Alle Repos migriert zu Codeberg."
