# ============================================================
#  GitHub Actions: Migration zu Codeberg
#  Konfiguration: Codeberg = Hauptrepo, GitHub = Spiegel
#
#  Einmalig ausführen: Actions Tab → "Migrate to Codeberg" → Run workflow
# ============================================================

name: Migrate to Codeberg

on:
  workflow_dispatch:   # Nur manuell auslösbar

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Volle History

      - name: Migrate all repos to Codeberg
        env:
          GH_TOKEN:  ${{ secrets.GH_TOKEN }}
          CB_TOKEN:  ${{ secrets.CB_TOKEN }}
          GH_USER:   hcousin
          CB_USER:   hcousin
        run: |
          set -e

          GREEN='\033[0;32m'; BLUE='\033[0;34m'; RED='\033[0;31m'; NC='\033[0m'
          ok()   { echo -e "${GREEN}✓${NC} $1"; }
          info() { echo -e "${BLUE}→${NC} $1"; }
          err()  { echo -e "${RED}✗${NC} $1"; }

          echo "════════════════════════════════════════════"
          echo "  GitHub → Codeberg Migration"
          echo "  Codeberg = Hauptrepo | GitHub = Spiegel"
          echo "════════════════════════════════════════════"
          echo ""

          # ── Alle GitHub-Repos abrufen ────────────────
          info "GitHub Repositories werden abgerufen..."
          REPOS=$(curl -s \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/user/repos?per_page=100&type=all")

          echo "$REPOS" | python3 -c "
          import json, sys
          repos = json.load(sys.stdin)
          for r in repos:
              priv = 'true' if r['private'] else 'false'
              desc = (r.get('description') or '').replace('|','').replace('\n',' ')[:200]
              print(f\"{r['name']}|{priv}|{desc}\")
          " > /tmp/repos.txt

          echo "Gefundene Repos:"
          cat /tmp/repos.txt | while IFS='|' read -r name priv desc; do
              icon="public"; [ "$priv" = "true" ] && icon="private"
              echo "  [$icon] $name"
          done
          echo ""

          # ── Funktion: Einzelnes Repo migrieren ───────
          migrate_repo() {
              local REPO_NAME="$1"
              local IS_PRIVATE="$2"
              local DESCRIPTION="$3"

              echo "────────────────────────────────────────"
              info "Migriere: $REPO_NAME"

              # 1. Codeberg Repo erstellen
              info "[1/5] Erstelle Repo auf Codeberg..."
              CB_RESP=$(curl -s -X POST \
                -H "Authorization: token $CB_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{
                  \"name\": \"$REPO_NAME\",
                  \"description\": \"$DESCRIPTION\",
                  \"private\": $IS_PRIVATE,
                  \"auto_init\": false,
                  \"default_branch\": \"main\"
                }" \
                "https://codeberg.org/api/v1/user/repos")

              CB_URL=$(echo "$CB_RESP" | python3 -c "
          import json,sys
          r=json.load(sys.stdin)
          print(r.get('clone_url','EXISTS'))
          " 2>/dev/null || echo "EXISTS")

              if [ "$CB_URL" = "EXISTS" ] || [ -z "$CB_URL" ]; then
                  CB_URL="https://codeberg.org/$CB_USER/$REPO_NAME.git"
                  info "  Repo existiert bereits auf Codeberg"
              else
                  ok "  Repo erstellt auf Codeberg"
              fi

              # 2. GitHub Mirror-Clone
              info "[2/5] Mirror-Clone von GitHub..."
              git clone --mirror \
                "https://$GH_USER:$GH_TOKEN@github.com/$GH_USER/$REPO_NAME.git" \
                "/tmp/$REPO_NAME.git"
              ok "  Geklont (volle History)"

              # 3. Push zu Codeberg
              info "[3/5] Push zu Codeberg..."
              cd "/tmp/$REPO_NAME.git"
              git remote set-url origin \
                "https://$CB_USER:$CB_TOKEN@codeberg.org/$CB_USER/$REPO_NAME.git"
              git push --mirror origin
              ok "  Push abgeschlossen"
              cd /tmp && rm -rf "/tmp/$REPO_NAME.git"

              # 4. GitHub als Push-Spiegel auf Codeberg konfigurieren
              info "[4/5] GitHub als Push-Spiegel konfigurieren..."
              MIRROR_RESP=$(curl -s -X POST \
                -H "Authorization: token $CB_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{
                  \"remote_address\": \"https://github.com/$GH_USER/$REPO_NAME.git\",
                  \"remote_username\": \"$GH_USER\",
                  \"remote_password\": \"$GH_TOKEN\",
                  \"sync_on_commit\": true,
                  \"interval\": \"8h0m0s\"
                }" \
                "https://codeberg.org/api/v1/repos/$CB_USER/$REPO_NAME/push_mirrors")

              MIRROR_ID=$(echo "$MIRROR_RESP" | python3 -c "
          import json,sys
          r=json.load(sys.stdin)
          print(r.get('id','ERR'))
          " 2>/dev/null || echo "ERR")

              if [ "$MIRROR_ID" != "ERR" ] && [ -n "$MIRROR_ID" ]; then
                  ok "  Push-Spiegel aktiv (sync bei Commit + alle 8h)"
              else
                  err "  Push-Spiegel evtl. bereits vorhanden — OK"
              fi

              # 5. GitHub Beschreibung aktualisieren
              info "[5/5] GitHub Repo als Spiegel kennzeichnen..."
              curl -s -X PATCH \
                -H "Authorization: token $GH_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"description\": \"[Mirror] Hauptrepo: https://codeberg.org/$CB_USER/$REPO_NAME\"}" \
                "https://api.github.com/repos/$GH_USER/$REPO_NAME" > /dev/null
              ok "  GitHub Beschreibung aktualisiert"

              echo ""
              echo "  ✅ $REPO_NAME fertig!"
              echo "     Codeberg: https://codeberg.org/$CB_USER/$REPO_NAME"
              echo "     GitHub:   https://github.com/$GH_USER/$REPO_NAME (Spiegel)"
              echo ""
          }

          # ── Alle Repos migrieren ─────────────────────
          while IFS='|' read -r name priv desc; do
              migrate_repo "$name" "$priv" "$desc"
          done < /tmp/repos.txt

          # ── Zusammenfassung ──────────────────────────
          echo "════════════════════════════════════════════"
          echo "  Migration abgeschlossen!"
          echo "════════════════════════════════════════════"
          echo ""
          echo "Codeberg Hauptrepos:"
          while IFS='|' read -r name priv desc; do
              echo "  ✓ https://codeberg.org/$CB_USER/$name"
          done < /tmp/repos.txt
          echo ""
          echo "GitHub Spiegel (auto-sync alle 8h + bei Commit):"
          while IFS='|' read -r name priv desc; do
              echo "  → https://github.com/$GH_USER/$name"
          done < /tmp/repos.txt
