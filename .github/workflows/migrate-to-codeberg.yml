name: Migrate all repos to Codeberg (one-time + mirror setup)

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: Install jq
        run: sudo apt-get install -y jq

      # ─────────────────────────────────────────────
      # REPO 1: biomimetic-shark-robot (public)
      # ─────────────────────────────────────────────
      - name: "[1] Create on Codeberg: biomimetic-shark-robot"
        continue-on-error: true
        env:
          CB_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
        run: |
          resp=$(curl -s -X POST "https://codeberg.org/api/v1/user/repos" \
            -H "Authorization: token ${CB_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"name":"biomimetic-shark-robot","description":"","private":false,"auto_init":false}')
          echo "$resp" | jq '.full_name // .message'

      - name: "[1] Mirror push: biomimetic-shark-robot"
        env:
          CB_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git clone --bare "https://hcousin:${GH_PAT}@github.com/hcousin/biomimetic-shark-robot.git" r1
          cd r1
          # Debug: show remote refs
          git show-ref | head -5
          # Push using netrc for clean auth
          echo "machine codeberg.org login hcousin password ${CB_TOKEN}" > ~/.netrc
          chmod 600 ~/.netrc
          git push --mirror "https://codeberg.org/hcousin/biomimetic-shark-robot.git" 2>&1
          cd .. && rm -rf r1

      # ─────────────────────────────────────────────
      # REPO 2: SBB_Display_Arduino_GTFSRT (public)
      # ─────────────────────────────────────────────
      - name: "[2] Create on Codeberg: SBB_Display_Arduino_GTFSRT"
        continue-on-error: true
        env:
          CB_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
        run: |
          resp=$(curl -s -X POST "https://codeberg.org/api/v1/user/repos" \
            -H "Authorization: token ${CB_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"name":"SBB_Display_Arduino_GTFSRT","description":"ESP32-S3 e-paper SBB departure board using GTFS-RT and OJP APIs from opentransportdata.swiss","private":false,"auto_init":false}')
          echo "$resp" | jq '.full_name // .message'

      - name: "[2] Mirror push: SBB_Display_Arduino_GTFSRT"
        env:
          CB_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          echo "machine codeberg.org login hcousin password ${CB_TOKEN}" > ~/.netrc
          chmod 600 ~/.netrc
          git clone --bare "https://hcousin:${GH_PAT}@github.com/hcousin/SBB_Display_Arduino_GTFSRT.git" r2
          cd r2
          git push --mirror "https://codeberg.org/hcousin/SBB_Display_Arduino_GTFSRT.git" 2>&1
          cd .. && rm -rf r2

      # ─────────────────────────────────────────────
      # REPO 3: SBB_Display_Arduino_Json (privat)
      # ─────────────────────────────────────────────
      - name: "[3] Create on Codeberg: SBB_Display_Arduino_Json"
        continue-on-error: true
        env:
          CB_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
        run: |
          resp=$(curl -s -X POST "https://codeberg.org/api/v1/user/repos" \
            -H "Authorization: token ${CB_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"name":"SBB_Display_Arduino_Json","description":"","private":true,"auto_init":false}')
          echo "$resp" | jq '.full_name // .message'

      - name: "[3] Mirror push: SBB_Display_Arduino_Json"
        env:
          CB_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          echo "machine codeberg.org login hcousin password ${CB_TOKEN}" > ~/.netrc
          chmod 600 ~/.netrc
          git clone --bare "https://hcousin:${GH_PAT}@github.com/hcousin/SBB_Display_Arduino_Json.git" r3
          cd r3
          git push --mirror "https://codeberg.org/hcousin/SBB_Display_Arduino_Json.git" 2>&1
          cd .. && rm -rf r3

      - name: "✅ Migration complete"
        run: |
          echo "Alle 3 Repos migriert:"
          echo "  https://codeberg.org/hcousin/biomimetic-shark-robot"
          echo "  https://codeberg.org/hcousin/SBB_Display_Arduino_GTFSRT"
          echo "  https://codeberg.org/hcousin/SBB_Display_Arduino_Json"
