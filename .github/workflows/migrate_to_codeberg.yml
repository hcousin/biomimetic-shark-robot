name: Migrate to Codeberg

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write migration script
        run: |
          cat > /tmp/migrate.py << 'PYEOF'
import json, os, subprocess, sys, urllib.request, urllib.error, base64

GH_TOKEN = os.environ["GH_TOKEN"]
CB_TOKEN = os.environ["CB_TOKEN"]
GH_USER  = os.environ.get("GH_USER", "hcousin")
CB_USER  = os.environ.get("CB_USER", "hcousin")

def gh(path, method="GET", data=None):
    url = f"https://api.github.com{path}"
    req = urllib.request.Request(url, data=json.dumps(data).encode() if data else None,
          method=method, headers={"Authorization": f"token {GH_TOKEN}",
          "Accept": "application/vnd.github.v3+json", "Content-Type": "application/json"})
    try:
        with urllib.request.urlopen(req) as r:
            return json.loads(r.read()) if r.read() else {}
    except Exception as e:
        return {"error": str(e)}

def cb(path, method="GET", data=None):
    url = f"https://codeberg.org/api/v1{path}"
    req = urllib.request.Request(url, data=json.dumps(data).encode() if data else None,
          method=method, headers={"Authorization": f"token {CB_TOKEN}",
          "Content-Type": "application/json"})
    try:
        with urllib.request.urlopen(req) as r:
            body = r.read()
            return json.loads(body) if body else {}
    except urllib.error.HTTPError as e:
        body = e.read().decode()
        print(f"  HTTP {e.code}: {body[:200]}")
        return {"error": e.code}

def run(cmd, **kw):
    print(f"  $ {' '.join(cmd)}")
    result = subprocess.run(cmd, capture_output=True, text=True, **kw)
    if result.stdout: print(result.stdout[-500:])
    if result.stderr: print(result.stderr[-500:])
    return result.returncode == 0

# Verify tokens
print("\n=== Token-Prüfung ===")
me_gh = gh("/user")
print(f"GitHub: {me_gh.get('login', 'FEHLER: ' + str(me_gh.get('error','?')))}")
me_cb = cb("/user")
print(f"Codeberg: {me_cb.get('login', 'FEHLER: ' + str(me_cb.get('error','?')))}")

if me_cb.get("error"):
    print("ABBRUCH: Codeberg Token ungültig!")
    sys.exit(1)

# Fetch repos
print("\n=== GitHub Repositories ===")
repos = gh("/user/repos?per_page=100&type=all")
if not isinstance(repos, list):
    print("FEHLER beim Abrufen der Repos:", repos)
    sys.exit(1)

for r in repos:
    print(f"  {'🔒' if r['private'] else '🔓'} {r['name']}")

# Migrate each repo
for repo in repos:
    name = repo["name"]
    is_private = repo["private"]
    desc = (repo.get("description") or "").replace('"', "'")

    print(f"\n{'='*50}")
    print(f"Migriere: {name}")
    print(f"{'='*50}")

    # 1. Create on Codeberg
    print("\n[1/5] Erstelle Repo auf Codeberg...")
    r = cb("/user/repos", "POST", {
        "name": name, "description": desc,
        "private": is_private, "auto_init": False,
        "default_branch": "main"
    })
    if r.get("error") == 409 or "already exists" in str(r).lower():
        print("  Repo existiert bereits — OK")
    elif r.get("clone_url"):
        print(f"  ✓ Erstellt: {r['clone_url']}")
    else:
        print(f"  Info: {r}")

    # 2. Mirror clone from GitHub
    print("\n[2/5] Mirror-Clone von GitHub...")
    clone_dir = f"/tmp/{name}.git"
    ok = run(["git", "clone", "--mirror",
              f"https://{GH_USER}:{GH_TOKEN}@github.com/{GH_USER}/{name}.git",
              clone_dir])
    if not ok:
        print("  FEHLER beim Klonen!"); continue
    print("  ✓ Geklont")

    # 3. Push to Codeberg
    print("\n[3/5] Push zu Codeberg...")
    ok = run(["git", "remote", "set-url", "origin",
              f"https://{CB_USER}:{CB_TOKEN}@codeberg.org/{CB_USER}/{name}.git"],
             cwd=clone_dir)
    ok = run(["git", "push", "--mirror", "origin"], cwd=clone_dir)
    if not ok:
        print("  FEHLER beim Push!")
    else:
        print("  ✓ Push abgeschlossen")

    subprocess.run(["rm", "-rf", clone_dir])

    # 4. Configure GitHub as push mirror on Codeberg
    print("\n[4/5] GitHub als Push-Spiegel konfigurieren...")
    r = cb(f"/repos/{CB_USER}/{name}/push_mirrors", "POST", {
        "remote_address": f"https://github.com/{GH_USER}/{name}.git",
        "remote_username": GH_USER,
        "remote_password": GH_TOKEN,
        "sync_on_commit": True,
        "interval": "8h0m0s"
    })
    if r.get("id"):
        print(f"  ✓ Push-Spiegel aktiv (ID: {r['id']}, alle 8h + bei Commit)")
    else:
        print(f"  Info: {r}")

    # 5. Update GitHub description
    print("\n[5/5] GitHub Beschreibung aktualisieren...")
    r = gh(f"/repos/{GH_USER}/{name}", "PATCH", {
        "description": f"[Mirror] Hauptrepo: https://codeberg.org/{CB_USER}/{name}"
    })
    if r.get("name"):
        print(f"  ✓ Beschreibung aktualisiert")

    print(f"\n  ✅ {name} fertig!")
    print(f"     Codeberg: https://codeberg.org/{CB_USER}/{name}")
    print(f"     GitHub:   https://github.com/{GH_USER}/{name} (Spiegel)")

print("\n" + "="*50)
print("Migration abgeschlossen!")
print("="*50)
PYEOF
          echo "✓ Script geschrieben"

      - name: Run migration
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CB_TOKEN: ${{ secrets.CB_TOKEN }}
          GH_USER:  hcousin
          CB_USER:  hcousin
        run: python3 /tmp/migrate.py
